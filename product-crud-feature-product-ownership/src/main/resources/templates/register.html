<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded shadow w-full max-w-md">

    <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

    <!-- Error -->
    <div th:if="${error}" class="bg-red-100 text-red-700 p-2 mb-3 rounded text-sm"
         th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

        <input type="text" th:field="*{username}"
               placeholder="Username"
               class="w-full mb-3 px-3 py-2 border rounded focus:ring-2 focus:ring-green-500"
               required>

        <input type="password" th:field="*{password}"
               placeholder="Password"
               class="w-full mb-3 px-3 py-2 border rounded focus:ring-2 focus:ring-green-500"
               required>

        <input type="password" th:field="*{confirmPassword}"
               placeholder="Konfirmasi Password"
               class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-green-500"
               required>

        <button type="submit"
                class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
            Daftar
        </button>
    </form>

    <div class="text-center mt-3 text-sm">
        Sudah punya akun?
        <a th:href="@{/login}" class="text-blue-600 hover:underline">Login</a>
    </div>

</div>

</body>
</html>
