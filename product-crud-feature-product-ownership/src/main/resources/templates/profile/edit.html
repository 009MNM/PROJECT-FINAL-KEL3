<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-100 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-3xl mx-auto py-10 px-4">
    <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white">Edit Profil</h2>
            <p class="text-indigo-100 text-sm opacity-80">Perbarui informasi diri Anda agar selalu mutakhir.</p>
        </div>

        <form th:action="@{/profile/update}" th:object="${user}" method="POST" class="p-8 space-y-6">
            <input type="hidden" th:field="*{id}">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Nama Lengkap</label>
                    <input type="text" th:field="*{fullName}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Email</label>
                    <input type="email" th:field="*{email}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Nomor Telepon</label>
                    <input type="text" th:field="*{phoneNumber}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">URL Foto Profil</label>
                    <input type="text" th:field="*{profileImageUrl}" placeholder="https://..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Alamat Lengkap</label>
                <textarea th:field="*{address}" rows="2"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"></textarea>
            </div>

            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Bio Singkat</label>
                <textarea th:field="*{bio}" rows="3"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"></textarea>
            </div>

            <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-100">
                <a th:href="@{/profile}" class="text-gray-500 hover:text-gray-700 font-semibold transition">Batal</a>
                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-8 rounded-full shadow-lg shadow-indigo-100 transition duration-300 transform hover:scale-105">
                    Simpan Perubahan
                </button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
