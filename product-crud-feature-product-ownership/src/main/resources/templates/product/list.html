<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 mt-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Daftar Produk</h2>
        <a th:href="@{/products/new}" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">
            + Tambah Produk Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 relative">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 relative">
        <span th:text="${errorMessage}"></span>
    </div>

    <p class="text-gray-500 mb-4 text-sm">
        Total produk: <strong th:text="${#lists.size(products)}" class="text-gray-800">0</strong>
    </p>

    <div th:if="${!#lists.isEmpty(products)}" class="overflow-x-auto bg-white rounded-lg shadow">
        <table class="min-w-full leading-normal">
            <thead>
            <tr class="bg-gray-800 text-white text-left text-xs uppercase tracking-wider">
                <th class="px-5 py-3 border-b border-gray-200">No</th>
                <th class="px-5 py-3 border-b border-gray-200">Nama</th>
                <th class="px-5 py-3 border-b border-gray-200">Kategori</th>
                <th class="px-5 py-3 border-b border-gray-200">Harga</th>
                <th class="px-5 py-3 border-b border-gray-200">Stok</th>
                <th class="px-5 py-3 border-b border-gray-200 text-center">Status</th>
                <th class="px-5 py-3 border-b border-gray-200 text-center">Aksi</th>
            </tr>
            </thead>
            <tbody class="text-gray-700">
            <tr th:each="product, iterStat : ${products}" class="hover:bg-gray-50 border-b border-gray-200">
                <td class="px-5 py-4 text-sm" th:text="${iterStat.index + 1}">1</td>
                <td class="px-5 py-4 text-sm font-semibold" th:text="${product.name}">Nama Produk</td>
                <td class="px-5 py-4 text-sm" th:text="${product.category?.displayName}">Kategori</td>
                <td class="px-5 py-4 text-sm" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                <td class="px-5 py-4 text-sm" th:text="${product.stock}">0</td>
                <td class="px-5 py-4 text-sm text-center">
                    <span th:if="${product.active}" class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold uppercase">Aktif</span>
                    <span th:unless="${product.active}" class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-bold uppercase">Tidak Aktif</span>
                </td>
                <td class="px-5 py-4 text-sm text-center">
                    <div class="flex justify-center gap-2">
                        <a th:href="@{/products/{id}(id=${product.id})}" class="text-blue-600 hover:text-blue-900 font-medium">Detail</a>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="text-yellow-600 hover:text-yellow-900 font-medium">Edit</a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" class="inline"
                              onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                            <button type="submit" class="text-red-600 hover:text-red-900 font-medium">Hapus</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-20 bg-white rounded-lg shadow mt-4">
        <p class="text-gray-500 text-lg mb-4">Belum ada produk.</p>
        <a th:href="@{/products/new}" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
            Tambah Produk Pertama
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
