<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body class="bg-gray-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-xl mx-auto bg-white p-6 mt-10 rounded shadow">

    <h2 class="text-2xl font-bold mb-6 text-center"
        th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
        Form Produk
    </h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post">

        <input type="hidden" th:field="*{id}">

        <!-- Nama -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Nama Produk</label>
            <input type="text" th:field="*{name}"
                   class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"
                   placeholder="Masukkan nama produk" required>
        </div>

        <!-- Kategori -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Kategori</label>
            <select name="categoryId" class="...">
                <option value="">-- Pilih Kategori --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${product.category?.id == cat.id}"> </option>
            </select>
        </div>

        <!-- Harga -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Harga</label>
            <input type="hidden" th:field="*{price}" id="price">
            <input type="text" id="priceDisplay"
                   class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"
                   placeholder="Masukkan harga produk" required>
        </div>

        <!-- Stok -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Stok</label>
            <input type="number" th:field="*{stock}"
                   class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"
                   min="0" required>
        </div>

        <!-- Deskripsi -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Deskripsi</label>
            <textarea th:field="*{description}"
                      class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"
                      rows="3"></textarea>
        </div>

        <!-- Checkbox -->
        <div class="mb-4 flex items-center gap-2">
            <input type="checkbox" th:field="*{active}" class="w-4 h-4">
            <label>Produk Aktif</label>
        </div>

        <!-- Tanggal -->
        <div class="mb-4">
            <label class="block mb-1 font-medium">Tanggal Dibuat</label>
            <input type="date" th:field="*{createdAt}"
                   class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <!-- Buttons -->
        <div class="flex gap-2">
            <button type="submit"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Simpan
            </button>

            <a th:href="@{/products}"
               class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
                Batal
            </a>
        </div>

    </form>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('price');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatThousand(value) {
        return Number(value).toLocaleString('id-ID');
    }

    if (priceHidden.value && priceHidden.value !== '0') {
        priceDisplay.value = formatThousand(priceHidden.value);
    }

    priceDisplay.addEventListener('input', function () {
        const raw = this.value.replace(/\./g, '').replace(/\D/g, '');
        priceHidden.value = raw;
        this.value = raw ? formatThousand(raw) : '';
    });
</script>

</body>
</html>
