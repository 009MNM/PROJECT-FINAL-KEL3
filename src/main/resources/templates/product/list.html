<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 mt-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Daftar Produk</h2>
        <a th:href="@{/products/new}" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">
            + Tambah Produk Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 relative">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 relative">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- 🔹 FORM SEARCH & FILTER -->
    <form th:action="@{/products}" method="get" class="bg-white p-4 rounded-lg shadow mb-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Search by Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cari Produk</label>
                <input type="text" name="search" th:value="${currentSearch}"
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Ketik nama produk...">
            </div>

            <!-- Filter by Category -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                <select name="category" class="...">
                    <option value="">-- Semua Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${currentCategory == cat.id}">
                    </option>
                </select>
            </div>

            <!-- Buttons -->
            <div class="flex items-end gap-2">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition w-full md:w-auto">
                    🔍 Cari
                </button>
                <a th:href="@{/products}" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 transition w-full md:w-auto text-center">
                    Reset
                </a>
            </div>
        </div>
    </form>

    <!-- 🔹 INFO TOTAL DATA & PAGINATION INFO -->
    <div class="flex justify-between items-center mb-4 text-sm text-gray-600">
        <p>
            Menampilkan <strong th:text="${products.content.size()}">0</strong>
            dari total <strong th:text="${totalItems}">0</strong> produk
        </p>
        <p th:if="${totalPages > 0}">
            Halaman <strong th:text="${currentPage + 1}">1</strong> dari <strong th:text="${totalPages}">1</strong>
        </p>
    </div>

    <!-- 🔹 TABEL DATA (pakai .content karena products adalah Page) -->
    <div th:if="${!products.empty}" class="overflow-x-auto bg-white rounded-lg shadow">
        <table class="min-w-full leading-normal">
            <thead>
            <tr class="bg-gray-800 text-white text-left text-xs uppercase tracking-wider">
                <th class="px-5 py-3 border-b border-gray-200">No</th>
                <th class="px-5 py-3 border-b border-gray-200">Nama</th>
                <th class="px-5 py-3 border-b border-gray-200">Kategori</th>
                <th class="px-5 py-3 border-b border-gray-200">Harga</th>
                <th class="px-5 py-3 border-b border-gray-200">Stok</th>
                <th class="px-5 py-3 border-b border-gray-200 text-center">Status</th>
                <th class="px-5 py-3 border-b border-gray-200 text-center">Aksi</th>
            </tr>
            </thead>
            <tbody class="text-gray-700">
            <!-- ⚠️ Perhatikan: products.content, bukan products -->
            <tr th:each="product, iterStat : ${products.content}" class="hover:bg-gray-50 border-b border-gray-200">
                <!-- No: hitung berdasarkan page & index -->
                <td class="px-5 py-4 text-sm" th:text="${currentPage * 10 + iterStat.index + 1}">1</td>
                <td class="px-5 py-4 text-sm font-semibold" th:text="${product.name}">Nama Produk</td>
                <td class="px-5 py-4 text-sm" th:text="${product.category?.name}">-</td>
                <td class="px-5 py-4 text-sm" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                <td class="px-5 py-4 text-sm" th:text="${product.stock}">0</td>
                <td class="px-5 py-4 text-sm text-center">
                    <span th:if="${product.active}" class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold uppercase">Aktif</span>
                    <span th:unless="${product.active}" class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-bold uppercase">Tidak Aktif</span>
                </td>
                <td class="px-5 py-4 text-sm text-center">
                    <div class="flex justify-center gap-2">
                        <a th:href="@{/products/{id}(id=${product.id})}" class="text-blue-600 hover:text-blue-900 font-medium">Detail</a>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}" class="text-yellow-600 hover:text-yellow-900 font-medium">Edit</a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" class="inline"
                              onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                            <button type="submit" class="text-red-600 hover:text-red-900 font-medium">Hapus</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${products.empty}" class="text-center py-20 bg-white rounded-lg shadow mt-4">
        <p class="text-gray-500 text-lg mb-4">Belum ada produk yang sesuai pencarian.</p>
        <a th:href="@{/products/new}" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
            Tambah Produk Pertama
        </a>
    </div>

    <!-- 🔹 PAGINATION CONTROLS -->
    <div th:if="${totalPages > 1}" class="mt-6 flex justify-center">
        <nav>
            <ul class="flex items-center gap-1">

                <!-- Previous Button -->
                <li>
                    <a th:if="${currentPage > 0}"
                       th:href="@{/products(page=${currentPage - 1}, size=10, search=${currentSearch}, category=${currentCategory})}"
                       class="px-3 py-2 border border-gray-300 rounded-l-lg text-gray-700 hover:bg-gray-100 transition">
                        ← Prev
                    </a>
                    <span th:unless="${currentPage > 0}" class="px-3 py-2 border border-gray-300 rounded-l-lg text-gray-400 bg-gray-50 cursor-not-allowed">
                        ← Prev
                    </span>
                </li>

                <!-- Page Numbers (tampilkan max 5 halaman) -->
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:if="${i >= currentPage - 2 and i <= currentPage + 2}">
                    <a th:href="@{/products(page=${i}, size=10, search=${currentSearch}, category=${currentCategory})}"
                       th:text="${i + 1}"
                       th:classappend="${currentPage == i} ? 'bg-blue-600 text-white font-bold' : 'text-gray-700 hover:bg-gray-100'"
                       class="px-3 py-2 border border-gray-300 transition">
                    </a>
                </li>

                <!-- Ellipsis (...) jika halaman banyak -->
                <li th:if="${currentPage + 2 < totalPages - 1}">
                    <span class="px-3 py-2 text-gray-500">...</span>
                </li>

                <!-- Next Button -->
                <li>
                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/products(page=${currentPage + 1}, size=10, search=${currentSearch}, category=${currentCategory})}"
                       class="px-3 py-2 border border-gray-300 rounded-r-lg text-gray-700 hover:bg-gray-100 transition">
                        Next →
                    </a>
                    <span th:unless="${currentPage < totalPages - 1}" class="px-3 py-2 border border-gray-300 rounded-r-lg text-gray-400 bg-gray-50 cursor-not-allowed">
                        Next →
                    </span>
                </li>

            </ul>
        </nav>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
