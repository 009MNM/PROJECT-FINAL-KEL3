<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-100 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-4xl mx-auto py-12 px-4">
    <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-100">
        <div class="bg-indigo-700 h-40 flex items-center justify-center relative">
            <h2 class="text-white text-2xl font-bold opacity-20 uppercase tracking-widest">User Profile</h2>
        </div>

        <div class="px-8 pb-10">
            <div class="relative -mt-20 flex justify-center mb-6">
                <img class="h-40 w-40 rounded-full border-8 border-white shadow-xl bg-gray-200 object-cover"
                     th:src="${user.profileImageUrl != null && !user.profileImageUrl.empty ? user.profileImageUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=256'}"
                     alt="Profile Picture">
            </div>

            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-gray-900" th:text="${user.fullName}">Nama Lengkap</h1>
                <p class="text-indigo-600 font-semibold text-lg" th:text="'@' + ${user.username}">@username</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-gray-100 pt-10">
                <div class="space-y-1">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-wider">Email Address</label>
                    <p class="text-gray-700 font-medium" th:text="${user.email}">email@example.com</p>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-wider">Phone Number</label>
                    <p class="text-gray-700 font-medium" th:text="${user.phoneNumber ?: '-'}">08123456789</p>
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-wider">Home Address</label>
                    <p class="text-gray-700 font-medium" th:text="${user.address ?: 'Alamat belum diatur'}">Alamat...</p>
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-wider">Bio / About Me</label>
                    <div class="bg-gray-50 p-4 rounded-xl italic text-gray-600 border border-gray-100" th:text="${user.bio ?: 'Halo! Saya pengguna Product CRUD.'}">
                        Bio singkat...
                    </div>
                </div>
            </div>

            <div class="mt-12 flex justify-center">
                <a th:href="@{/profile/edit}" class="inline-flex items-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-full transition duration-300 shadow-lg shadow-indigo-200 transform hover:scale-105">
                    <span class="mr-2"></span> Edit Profile
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
