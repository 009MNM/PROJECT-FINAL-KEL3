<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Buat Akun Baru</h2>

    <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded text-sm"
         th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap (Opsional)</label>
            <input type="text" th:field="*{fullName}"
                   placeholder="Contoh: Engela Kristin"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email (Opsional)</label>
            <input type="email" th:field="*{email}"
                   placeholder="nama@email.com"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <hr class="my-4 border-gray-200">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" th:field="*{username}"
                   placeholder="Pilih username"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                   required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" th:field="*{password}"
                   placeholder="••••••••"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                   required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password</label>
            <input type="password" th:field="*{confirmPassword}"
                   placeholder="••••••••"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-md">
            Daftar Sekarang
        </button>
    </form>

    <div class="text-center mt-6 text-sm text-gray-600">
        Sudah punya akun?
        <a th:href="@{/login}" class="text-indigo-600 font-bold hover:underline">Login di sini</a>
    </div>

</div>

</body>
</html>
